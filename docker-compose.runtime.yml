services:
  winter-app:
    image: ${APP_IMAGE}
    container_name: ${APP_CONTAINER_NAME:-winter-app}
    restart: unless-stopped
    env_file:
      - .env.runtime
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      LOG_CHANNEL: stderr
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - winter_storage:/var/www/html/storage
      - winter_cache:/var/www/html/bootstrap/cache

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-winter-redis}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redis_data:/data

volumes:
  winter_storage:
  winter_cache:
  redis_data:
